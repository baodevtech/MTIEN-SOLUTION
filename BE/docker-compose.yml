services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtien}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mtien_solution}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtien} -d ${POSTGRES_DB:-mtien_solution}"]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mtien}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mtien_solution}?schema=public
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required (comma-separated, no wildcard in production)}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

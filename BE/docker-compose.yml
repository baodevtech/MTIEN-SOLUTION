services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mtien
      POSTGRES_PASSWORD: mtien_secret
      POSTGRES_DB: mtien_solution
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtien -d mtien_solution"]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://mtien:mtien_secret@postgres:5432/mtien_solution?schema=public
      - JWT_SECRET=${JWT_SECRET:-mtien-jwt-secret-change-in-production}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

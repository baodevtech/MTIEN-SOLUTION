name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (BE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        env:
          # Non-secret placeholder values just to satisfy env validation at build time.
          NODE_ENV: production
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          JWT_SECRET: ci-placeholder-jwt-secret-at-least-32-characters-long
          FRONTEND_ORIGIN: https://example.com
        run: npm run build

  frontend:
    name: Frontend (FE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_ADMIN_API_URL: https://example.com
          ADMIN_API_URL: https://example.com
          REVALIDATION_SECRET: ci-placeholder
        run: npm run build

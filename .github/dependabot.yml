version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/BE'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      prod-minor-and-patch:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      dev-minor-and-patch:
        dependency-type: 'development'
        update-types: ['minor', 'patch']

  - package-ecosystem: 'npm'
    directory: '/FE'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      prod-minor-and-patch:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      dev-minor-and-patch:
        dependency-type: 'development'
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'docker'
    directory: '/BE'
    schedule:
      interval: 'weekly'
